<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DataGuard // Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="margin-top: 10vh;">
        <header>
            <div class="brand"><h1>DATAGUARD</h1><span class="tagline">AUTH_REQUIRED</span></div>
        </header>
        <section class="terminal-box green-border">
            <div class="unit-label">UNIT_00: ACCESS_GATE</div>
            <input type="email" id="loginEmail" placeholder="OPERATOR_EMAIL">
            <input type="password" id="loginPassword" placeholder="PASSKEY">
            <button id="loginBtn">INITIALIZE_SESSION</button>
            <div class="auth-links" style="margin-top:15px; font-size:12px; text-align:center;">
                New Operator? <a href="register.html" style="color:cyan; text-decoration:none;">CREATE_ID</a>
            </div>
        </section>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
