<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DataGuard // Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="margin-top: 10vh;">
        <header>
            <div class="brand"><h1>DATAGUARD</h1><span class="tagline">NEW_IDENTITY_CREATION</span></div>
        </header>
        <section class="terminal-box blue-border">
            <div class="unit-label">UNIT_00: REGISTER_UNIT</div>
            <input type="email" id="regEmail" placeholder="EMAIL_ADDRESS">
            <input type="password" id="regPassword" placeholder="CHOOSE_PASSKEY">
            <button id="regBtn">REGISTER_OPERATOR</button>
            <div class="auth-links" style="margin-top:15px; font-size:12px; text-align:center;">
                Already have ID? <a href="login.html" style="color:cyan; text-decoration:none;">LOGIN_HERE</a>
            </div>
        </section>
    </div>
    <script type="module" src="register.js"></script>
</body>
</html>
